# ============================================================
# src/main/resources/application.properties
# ============================================================

spring.application.name=portfolio

# --- データソース（Docker コンテナに合わせた設定）---
spring.datasource.url=jdbc:mysql://localhost:3306/portfolio_db?useSSL=false&serverTimezone=Asia/Tokyo&characterEncoding=UTF-8
spring.datasource.username=portfolio_user
spring.datasource.password=portfolio_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate            # テーブルはSQLで管理するため自動変更しない
spring.jpa.show-sql=true                          # 開発中はSQL をコンソールに出力
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Thymeleaf ---
spring.thymeleaf.cache=false                      # 開発中はキャッシュ無効

# --- サーバー ---
server.port=8081                                  # 8080 は phpMyAdmin と競合しないよう変更
