# ============================================================
# src/main/resources/application.properties
# ============================================================

spring.application.name=portfolio

# --- データソース（Docker コンテナ） ---
spring.datasource.url=jdbc:mysql://localhost:3306/portfolio_db?useSSL=false&serverTimezone=Asia/Tokyo&characterEncoding=UTF-8
spring.datasource.username=portfolio_user
spring.datasource.password=portfolio_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
# テーブルは SQL で管理するため DDL 自動変更しない
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Thymeleaf ---
# 開発中はキャッシュを無効化（テンプレート変更がリロードで即反映）
spring.thymeleaf.cache=false

# --- Spring Security ---
# ログインフォームの username パラメータ名（デフォルトは username だがメール欄に合わせて確認）
spring.security.user.name=

# --- サーバー ---
server.port=8081
