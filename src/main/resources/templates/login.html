<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('ログイン')}"></head>

<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <p class="auth-card-title">&gt;_ login</p>

            <!-- エラーメッセージ（認証失敗） -->
            <div th:if="${param.error}" class="alert alert-danger" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i>
                メールアドレスまたはパスワードが正しくありません。
            </div>

            <!-- ログアウト後メッセージ -->
            <div th:if="${param.logout}" class="alert alert-success" role="alert">
                <i class="bi bi-check-circle me-2"></i>ログアウトしました。
            </div>

            <!-- フラッシュメッセージ（登録完了など） -->
            <div th:replace="~{layout/base :: flash}"></div>

            <!-- ログインフォーム（POST 先は Spring Security が処理） -->
            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="mb-3">
                    <label for="username" class="form-label">メールアドレス</label>
                    <input type="email" id="username" name="username" class="form-control"
                        placeholder="admin@example.com" autocomplete="email" required>
                </div>

                <div class="mb-4">
                    <label for="password" class="form-label">パスワード</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                        autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right me-2"></i>ログイン
                </button>
            </form>

            <hr style="border-color:var(--c-border);margin:1.5rem 0">

            <div class="text-center" style="font-size:.85rem;color:var(--c-muted)">
                <a th:href="@{/recover}">アカウントを復元する</a>
            </div>
        </div>
    </div>

    <th:block th:replace="~{layout/base :: scripts}"></th:block>
</body>

</html>
