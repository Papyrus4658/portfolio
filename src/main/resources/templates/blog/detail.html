<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head(${article.title})}"></head>

<body>
    <nav th:replace="~{layout/base :: navbar('blog')}"></nav>

    <main class="section">
        <div class="container" style="max-width:760px">
            <a th:href="@{/blog}" class="btn btn-outline-secondary btn-sm mb-4">
                <i class="bi bi-arrow-left me-1"></i>一覧に戻る
            </a>

            <article>
                <p class="mono mb-2" style="font-size:.78rem;color:var(--c-muted)">
                    <i class="bi bi-calendar3 me-1"></i>
                    <span th:text="${#temporals.format(article.publishedAt,'yyyy-MM-dd')}">2024-01-01</span>
                </p>
                <h1 style="font-size:clamp(1.6rem,3vw,2.2rem);font-weight:700;
                 letter-spacing:-.03em;margin-bottom:2rem" th:text="${article.title}">記事タイトル</h1>

                <!-- 本文（Markdown はまだプレーンテキスト表示。CommonMark 対応は次フェーズ） -->
                <div style="color:var(--c-muted);line-height:1.9;white-space:pre-wrap;font-size:.975rem"
                    th:text="${article.content}">本文</div>
            </article>
        </div>
    </main>

    <footer th:replace="~{layout/base :: footer}"></footer>
    <th:block th:replace="~{layout/base :: scripts}"></th:block>
</body>

</html>
