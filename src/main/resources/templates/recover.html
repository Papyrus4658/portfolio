<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('アカウント復元')}"></head>

<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <p class="auth-card-title">&gt;_ recover account</p>

            <div th:replace="~{layout/base :: flash}"></div>

            <p style="font-size:.875rem;color:var(--c-muted);margin-bottom:1.5rem;text-align:center">
                登録したメールアドレスを入力してください。
            </p>

            <form th:action="@{/recover}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-4">
                    <label for="email" class="form-label">メールアドレス</label>
                    <input type="email" id="email" name="email" class="form-control" required
                        placeholder="admin@example.com">
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-arrow-counterclockwise me-2"></i>アカウントを復元する
                </button>
            </form>

            <div class="text-center mt-3" style="font-size:.85rem;color:var(--c-muted)">
                <a th:href="@{/login}">ログインに戻る</a>
            </div>
        </div>
    </div>

    <th:block th:replace="~{layout/base :: scripts}"></th:block>
</body>

</html>
