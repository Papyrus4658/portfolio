<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ========== head fragment ========== -->

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title th:text="${title} + ' | Portfolio'">Portfolio</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
</head>

<!-- ========== navbar fragment ========== -->
<!--
  使い方: <nav th:replace="~{layout/base :: navbar(currentPage='home')}"></nav>
  currentPage の値: 'home' / 'projects' / 'blog' / 'admin'
-->
<nav th:fragment="navbar(currentPage)" class="navbar navbar-expand-md sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">&gt;_ <span>portfolio</span></a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
            aria-controls="mainNav" aria-expanded="false" aria-label="メニュー">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto align-items-md-center gap-md-1">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}" th:classappend="${currentPage == 'home'} ? ' active'">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/projects}"
                        th:classappend="${currentPage == 'projects'} ? ' active'">Works</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/blog}"
                        th:classappend="${currentPage == 'blog'} ? ' active'">Blog</a>
                </li>

                <!-- ログイン中のみ表示 -->
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/admin/projects}"
                        th:classappend="${currentPage == 'admin'} ? ' active'">
                        <i class="bi bi-tools me-1"></i>管理
                    </a>
                </li>
                <li class="nav-item ms-md-2" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button type="submit" class="btn btn-sm btn-outline-secondary">
                            <i class="bi bi-box-arrow-right me-1"></i>ログアウト
                        </button>
                    </form>
                </li>
                <li class="nav-item ms-md-2" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-sm btn-outline-secondary" th:href="@{/login}">
                        <i class="bi bi-person me-1"></i>ログイン
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- ========== flash fragment ========== -->
<div th:fragment="flash">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<!-- ========== footer fragment ========== -->
<footer th:fragment="footer" class="footer">
    <div class="container">
        <span class="mono" style="color:var(--c-accent)">&gt;_ portfolio</span>
        &nbsp;&mdash;&nbsp;
        <span>Built with Spring Boot + Thymeleaf + Bootstrap 5</span>
    </div>
</footer>

<!-- ========== scripts fragment ========== -->
<th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</th:block>

</html>
