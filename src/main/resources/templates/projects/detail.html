<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head(${project.title})}"></head>

<body>
    <nav th:replace="~{layout/base :: navbar('projects')}"></nav>

    <main>
        <!-- ヘッダー -->
        <div class="section" style="padding-bottom:2rem">
            <div class="container">
                <a th:href="@{/projects}" class="btn btn-outline-secondary btn-sm mb-4">
                    <i class="bi bi-arrow-left me-1"></i>一覧に戻る
                </a>

                <div class="row g-5 align-items-start">
                    <!-- サムネイル -->
                    <div class="col-lg-7">
                        <img th:if="${project.thumbnailUrl != null}" th:src="${project.thumbnailUrl}"
                            th:alt="${project.title}" class="img-fluid"
                            style="border-radius:var(--radius-lg);border:1px solid var(--c-border)">
                        <div th:unless="${project.thumbnailUrl != null}" class="project-card-thumb-placeholder"
                            style="border-radius:var(--radius-lg);border:1px solid var(--c-border)">
                            <span>// no image</span>
                        </div>
                    </div>

                    <!-- 情報 -->
                    <div class="col-lg-5">
                        <h1 style="font-size:clamp(1.6rem,3vw,2.4rem);font-weight:700;letter-spacing:-.03em;margin-bottom:1rem"
                            th:text="${project.title}">作品名</h1>

                        <!-- 技術スタック -->
                        <div class="mb-3" th:if="${project.techStack != null}">
                            <span class="tech-badge" th:each="t : ${#strings.arraySplit(project.techStack, ',')}"
                                th:text="${#strings.trim(t)}">Java</span>
                        </div>

                        <!-- 説明 -->
                        <p style="color:var(--c-muted);font-size:.975rem;line-height:1.8"
                            th:text="${project.description}">概要テキスト</p>

                        <!-- リンク -->
                        <div class="d-flex flex-column gap-2 mt-4">
                            <a th:if="${project.repositoryUrl != null}" th:href="${project.repositoryUrl}"
                                target="_blank" rel="noopener" class="btn btn-outline-secondary">
                                <i class="bi bi-git me-2"></i>リポジトリを見る
                            </a>
                            <a th:if="${project.demoUrl != null}" th:href="${project.demoUrl}" target="_blank"
                                rel="noopener" class="btn btn-primary">
                                <i class="bi bi-box-arrow-up-right me-2"></i>デモを見る
                            </a>
                        </div>

                        <!-- 登録日 -->
                        <p class="mt-4 mono" style="font-size:.75rem;color:var(--c-muted)">
                            <i class="bi bi-calendar3 me-1"></i>
                            <span th:text="${#temporals.format(project.createdAt, 'yyyy-MM-dd')}">2024-01-01</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout/base :: footer}"></footer>
    <th:block th:replace="~{layout/base :: scripts}"></th:block>
</body>

</html>
