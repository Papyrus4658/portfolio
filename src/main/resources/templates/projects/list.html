<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('Works')}"></head>

<body>
    <nav th:replace="~{layout/base :: navbar('projects')}"></nav>

    <main class="section">
        <div class="container">
            <h1 class="section-title">Works</h1>

            <p th:if="${#lists.isEmpty(projects)}" class="text-center py-5 mono" style="color:var(--c-muted)">
                // no projects yet
            </p>

            <div th:unless="${#lists.isEmpty(projects)}" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4">
                <div class="col" th:each="p : ${projects}">
                    <a th:href="@{/projects/{id}(id=${p.id})}" class="text-decoration-none">
                        <article class="project-card">
                            <img th:if="${p.thumbnailUrl != null}" th:src="${p.thumbnailUrl}" th:alt="${p.title}"
                                class="project-card-thumb">
                            <div th:unless="${p.thumbnailUrl != null}" class="project-card-thumb-placeholder">
                                <span>// no image</span>
                            </div>
                            <div class="project-card-body">
                                <h2 class="project-card-title" th:text="${p.title}">作品名</h2>
                                <p class="project-card-desc" th:text="${p.description}">概要</p>
                                <div th:if="${p.techStack != null}">
                                    <span class="tech-badge" th:each="t : ${#strings.arraySplit(p.techStack, ',')}"
                                        th:text="${#strings.trim(t)}">Java</span>
                                </div>
                            </div>
                        </article>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{layout/base :: footer}"></footer>
    <th:block th:replace="~{layout/base :: scripts}"></th:block>
</body>

</html>
