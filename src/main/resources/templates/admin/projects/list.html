<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('作品管理')}"></head>

<body>
    <nav th:replace="~{layout/base :: navbar('admin')}"></nav>

    <div class="section">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="section-title mb-0">Works 管理</h1>
                <a th:href="@{/admin/projects/new}" class="btn btn-primary btn-sm">
                    <i class="bi bi-plus-lg me-1"></i>新規追加
                </a>
            </div>

            <div th:replace="~{layout/base :: flash}"></div>

            <div class="admin-table">
                <table class="table">
                    <thead>
                        <tr>
                            <th>タイトル</th>
                            <th>技術スタック</th>
                            <th>表示順</th>
                            <th>状態</th>
                            <th>登録日</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(projects)}">
                            <td colspan="6" class="text-center py-4 mono" style="color:var(--c-muted)">// no projects
                            </td>
                        </tr>
                        <tr th:each="p : ${projects}">
                            <td>
                                <a th:href="@{/projects/{id}(id=${p.id})}" th:text="${p.title}" target="_blank">作品名</a>
                            </td>
                            <td>
                                <span th:if="${p.techStack != null}" style="font-size:.8rem;color:var(--c-muted)"
                                    th:text="${p.techStack}">Java, Spring</span>
                            </td>
                            <td th:text="${p.sortOrder}">0</td>
                            <td>
                                <span th:if="${p.deleteFlag == 0}" class="badge-published">公開中</span>
                                <span th:if="${p.deleteFlag == 1}" class="badge-hidden">非表示</span>
                            </td>
                            <td class="mono" style="font-size:.8rem;color:var(--c-muted)"
                                th:text="${#temporals.format(p.createdAt,'yyyy-MM-dd')}">2024-01-01</td>
                            <td>
                                <div class="d-flex gap-2 justify-content-end">
                                    <a th:href="@{/admin/projects/{id}/edit(id=${p.id})}"
                                        class="btn btn-sm btn-outline-secondary">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <!-- 公開中 → 非表示 -->
                                    <form th:if="${p.deleteFlag == 0}"
                                        th:action="@{/admin/projects/{id}/hide(id=${p.id})}" method="post"
                                        class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('非表示にしますか？')">
                                            <i class="bi bi-eye-slash"></i>
                                        </button>
                                    </form>
                                    <!-- 非表示 → 再公開 -->
                                    <form th:if="${p.deleteFlag == 1}"
                                        th:action="@{/admin/projects/{id}/restore(id=${p.id})}" method="post"
                                        class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-outline-secondary">
                                            <i class="bi bi-eye"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer th:replace="~{layout/base :: footer}"></footer>
    <th:block th:replace="~{layout/base :: scripts}"></th:block>
</body>

</html>
