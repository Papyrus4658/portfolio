<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('作品登録・編集')}"></head>

<body>
    <nav th:replace="~{layout/base :: navbar('admin')}"></nav>

    <div class="section">
        <div class="container" style="max-width:720px">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a th:href="@{/admin/projects}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h1 class="section-title mb-0">
                    <span th:text="${project.id != null} ? '作品を編集' : '作品を登録'">作品を登録</span>
                </h1>
            </div>

            <div th:replace="~{layout/base :: flash}"></div>

            <div style="background:var(--c-surface);border:1px solid var(--c-border);
                border-radius:var(--radius-lg);padding:2rem">

                <!-- 新規: POST /admin/projects  /  編集: POST /admin/projects/{id} -->
                <form th:action="${project.id != null}
                       ? @{/admin/projects/{id}(id=${project.id})}
                       : @{/admin/projects}" th:object="${project}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <!-- タイトル -->
                    <div class="mb-3">
                        <label for="title" class="form-label">作品名 <span style="color:var(--c-danger)">*</span></label>
                        <input type="text" id="title" th:field="*{title}" class="form-control" placeholder="ポートフォリオサイト"
                            required maxlength="100">
                        <div th:if="${#fields.hasErrors('title')}" class="mt-1"
                            style="font-size:.83rem;color:var(--c-danger)" th:errors="*{title}">エラー</div>
                    </div>

                    <!-- 概要 -->
                    <div class="mb-3">
                        <label for="description" class="form-label">概要</label>
                        <textarea id="description" th:field="*{description}" class="form-control" rows="4"
                            placeholder="作品の説明を入力してください"></textarea>
                    </div>

                    <!-- サムネイル URL -->
                    <div class="mb-3">
                        <label for="thumbnailUrl" class="form-label">サムネイル URL</label>
                        <input type="url" id="thumbnailUrl" th:field="*{thumbnailUrl}" class="form-control"
                            placeholder="https://example.com/image.png">
                    </div>

                    <!-- リポジトリ URL -->
                    <div class="mb-3">
                        <label for="repositoryUrl" class="form-label">リポジトリ URL</label>
                        <input type="url" id="repositoryUrl" th:field="*{repositoryUrl}" class="form-control"
                            placeholder="https://codeberg.org/yourname/repo">
                    </div>

                    <!-- デモ URL -->
                    <div class="mb-3">
                        <label for="demoUrl" class="form-label">デモサイト URL</label>
                        <input type="url" id="demoUrl" th:field="*{demoUrl}" class="form-control"
                            placeholder="https://yourapp.example.com">
                    </div>

                    <!-- 技術スタック -->
                    <div class="mb-3">
                        <label for="techStack" class="form-label">使用技術</label>
                        <input type="text" id="techStack" th:field="*{techStack}" class="form-control"
                            placeholder="Java, Spring Boot, MySQL" maxlength="255">
                        <div class="form-text" style="color:var(--c-muted);font-size:.8rem">
                            カンマ区切りで入力（例: Java, Spring Boot, MySQL）
                        </div>
                    </div>

                    <!-- 表示順 -->
                    <div class="mb-4" style="max-width:160px">
                        <label for="sortOrder" class="form-label">表示順</label>
                        <input type="number" id="sortOrder" th:field="*{sortOrder}" class="form-control" min="0"
                            value="0">
                        <div class="form-text" style="color:var(--c-muted);font-size:.8rem">
                            小さい値が先に表示されます
                        </div>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-lg me-2"></i>保存する
                        </button>
                        <a th:href="@{/admin/projects}" class="btn btn-outline-secondary px-4">
                            キャンセル
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer th:replace="~{layout/base :: footer}"></footer>
    <th:block th:replace="~{layout/base :: scripts}"></th:block>
</body>

</html>
