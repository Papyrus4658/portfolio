<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('記事管理')}"></head>

<body>
    <nav th:replace="~{layout/base :: navbar('admin')}"></nav>

    <div class="section">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="section-title mb-0">Blog 管理</h1>
                <a th:href="@{/admin/articles/new}" class="btn btn-primary btn-sm">
                    <i class="bi bi-plus-lg me-1"></i>新規作成
                </a>
            </div>

            <div th:replace="~{layout/base :: flash}"></div>

            <div class="admin-table">
                <table class="table">
                    <thead>
                        <tr>
                            <th>タイトル</th>
                            <th>状態</th>
                            <th>公開日</th>
                            <th>更新日</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(articles)}">
                            <td colspan="5" class="text-center py-4 mono" style="color:var(--c-muted)">// no articles
                            </td>
                        </tr>
                        <tr th:each="a : ${articles}">
                            <td>
                                <span th:text="${a.title}">タイトル</span>
                            </td>
                            <td>
                                <span th:if="${a.status.name() == 'published'}" class="badge-published">公開</span>
                                <span th:if="${a.status.name() == 'draft'}" class="badge-draft">下書き</span>
                            </td>
                            <td class="mono" style="font-size:.8rem;color:var(--c-muted)">
                                <span th:if="${a.publishedAt != null}"
                                    th:text="${#temporals.format(a.publishedAt,'yyyy-MM-dd')}">—</span>
                                <span th:if="${a.publishedAt == null}">—</span>
                            </td>
                            <td class="mono" style="font-size:.8rem;color:var(--c-muted)"
                                th:text="${#temporals.format(a.updatedAt,'yyyy-MM-dd')}">—</td>
                            <td>
                                <div class="d-flex gap-2 justify-content-end">
                                    <a th:href="@{/admin/articles/{id}/edit(id=${a.id})}"
                                        class="btn btn-sm btn-outline-secondary">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/admin/articles/{id}/delete(id=${a.id})}" method="post"
                                        class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('削除しますか？')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer th:replace="~{layout/base :: footer}"></footer>
    <th:block th:replace="~{layout/base :: scripts}"></th:block>
</body>

</html>
