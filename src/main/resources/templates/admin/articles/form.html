<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('記事編集')}"></head>

<body>
    <nav th:replace="~{layout/base :: navbar('admin')}"></nav>

    <div class="section">
        <div class="container" style="max-width:760px">
            <div class="d-flex align-items-center gap-3 mb-4">
                <a th:href="@{/admin/articles}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h1 class="section-title mb-0">
                    <span th:text="${article.id != null} ? '記事を編集' : '記事を作成'">記事を作成</span>
                </h1>
            </div>

            <div th:replace="~{layout/base :: flash}"></div>

            <div style="background:var(--c-surface);border:1px solid var(--c-border);
                border-radius:var(--radius-lg);padding:2rem">

                <form th:action="${article.id != null}
                       ? @{/admin/articles/{id}(id=${article.id})}
                       : @{/admin/articles}" th:object="${article}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <!-- タイトル -->
                    <div class="mb-3">
                        <label for="title" class="form-label">タイトル <span style="color:var(--c-danger)">*</span></label>
                        <input type="text" id="title" th:field="*{title}" class="form-control" required maxlength="200"
                            placeholder="Spring Boot 入門: Hello World から始める">
                        <div th:if="${#fields.hasErrors('title')}" class="mt-1"
                            style="font-size:.83rem;color:var(--c-danger)" th:errors="*{title}">エラー</div>
                    </div>

                    <!-- 本文 -->
                    <div class="mb-3">
                        <label for="content" class="form-label">本文
                            <span class="mono" style="font-size:.75rem;color:var(--c-muted);margin-left:.5rem">
                                Markdown 形式
                            </span>
                        </label>
                        <textarea id="content" th:field="*{content}" class="form-control mono" rows="16"
                            style="font-size:.875rem;line-height:1.6" placeholder="## はじめに&#10;ここに本文を入力..."></textarea>
                    </div>

                    <!-- サムネイル URL -->
                    <div class="mb-3">
                        <label for="thumbnailUrl" class="form-label">サムネイル URL</label>
                        <input type="url" id="thumbnailUrl" th:field="*{thumbnailUrl}" class="form-control"
                            placeholder="https://example.com/image.png">
                    </div>

                    <!-- ステータス -->
                    <div class="mb-4">
                        <label for="status" class="form-label">公開ステータス</label>
                        <select id="status" th:field="*{status}" class="form-select">
                            <option value="draft">下書き（非公開）</option>
                            <option value="published">公開する</option>
                        </select>
                        <div class="form-text" style="color:var(--c-muted);font-size:.8rem">
                            「公開する」に変更すると公開日時が自動で記録されます
                        </div>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="bi bi-check-lg me-2"></i>保存する
                        </button>
                        <a th:href="@{/admin/articles}" class="btn btn-outline-secondary px-4">
                            キャンセル
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <footer th:replace="~{layout/base :: footer}"></footer>
    <th:block th:replace="~{layout/base :: scripts}"></th:block>
</body>

</html>
