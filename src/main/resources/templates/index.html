<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/base :: head('Home')}"></head>

<body>
    <nav th:replace="~{layout/base :: navbar('home')}"></nav>

    <!-- ヒーロー -->
    <header class="hero">
        <div class="container">
            <p class="hero-eyebrow">Hello, World.</p>
            <h1 class="hero-title">I build things<br>for the <span class="accent">web.</span></h1>
            <p class="hero-sub">
                Java / Spring Boot を中心に学習中。PHP から Java への移行を経験した、
                バックエンド志向の開発者です。
            </p>
            <div class="d-flex gap-3 justify-content-center flex-wrap">
                <a th:href="@{/projects}" class="btn btn-primary px-4">
                    <i class="bi bi-grid me-2"></i>Works を見る
                </a>
                <a href="https://codeberg.org" target="_blank" rel="noopener" class="btn btn-outline-secondary px-4">
                    <i class="bi bi-git me-2"></i>Codeberg
                </a>
            </div>
        </div>
    </header>

    <!-- 作品ギャラリー（抜粋） -->
    <main class="section">
        <div class="container">
            <h2 class="section-title">Recent Works</h2>

            <p th:if="${#lists.isEmpty(projects)}" class="text-center py-5 mono" style="color:var(--c-muted)">
                // no projects yet
            </p>

            <div th:unless="${#lists.isEmpty(projects)}" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4">
                <div class="col" th:each="p : ${projects}">
                    <a th:href="@{/projects/{id}(id=${p.id})}" class="text-decoration-none">
                        <article class="project-card">
                            <img th:if="${p.thumbnailUrl != null}" th:src="${p.thumbnailUrl}" th:alt="${p.title}"
                                class="project-card-thumb">
                            <div th:unless="${p.thumbnailUrl != null}" class="project-card-thumb-placeholder">
                                <span>// no image</span>
                            </div>
                            <div class="project-card-body">
                                <h3 class="project-card-title" th:text="${p.title}">作品名</h3>
                                <p class="project-card-desc" th:text="${p.description}">概要</p>
                                <div th:if="${p.techStack != null}">
                                    <span class="tech-badge" th:each="t : ${#strings.arraySplit(p.techStack, ',')}"
                                        th:text="${#strings.trim(t)}">Java</span>
                                </div>
                            </div>
                        </article>
                    </a>
                </div>
            </div>

            <div class="text-center mt-5">
                <a th:href="@{/projects}" class="btn btn-outline-secondary px-4">
                    全ての作品を見る <i class="bi bi-arrow-right ms-1"></i>
                </a>
            </div>
        </div>
    </main>

    <!-- スキル -->
    <section class="section" style="border-top:1px solid var(--c-border)">
        <div class="container">
            <h2 class="section-title">Skills</h2>
            <div class="row g-3">
                <div class="col-6 col-md-3"
                    th:each="s : ${ {'Java','Spring Boot','PHP','MySQL','HTML/CSS','Python','Git','Docker'} }">
                    <div class="text-center mono" style="background:var(--c-surface);border:1px solid var(--c-border);
                    border-radius:var(--radius);padding:.875rem;font-size:.85rem;color:var(--c-muted)">
                        <span th:text="${s}">Java</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer th:replace="~{layout/base :: footer}"></footer>
    <th:block th:replace="~{layout/base :: scripts}"></th:block>
</body>

</html>
